<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate Etsy Keyword Database</title>

<style>
body{
font-family: Arial, sans-serif;
background:#fafafa;
margin:30px;
}

h1{
margin-bottom:20px;
}

.info-box{
background:#f1f3f5;
border-left:4px solid #6c757d;
padding:12px 16px;
margin-top:-10px;
margin-bottom:25px;
font-size:13px;
color:#444;
border-radius:4px;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:20px;
margin-bottom:25px;
}

.controls label{
font-size:14px;
display:flex;
flex-direction:column;
}

input, select{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

.table-hint{
font-size:12px;
color:#777;
margin-bottom:8px;
}

table{
border-collapse:collapse;
width:100%;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

th, td{
padding:16px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#f4f4f4;
cursor:pointer;
position:sticky;
top:0;
z-index:2;
}

th.sorted{
background:#e9f2ff;
}

.sort-icon{
font-size:11px;
margin-left:6px;
color:#999;
}

tr:hover{
background:#fafafa;
}

.copyBtn{
padding:5px 10px;
margin-right:10px;
cursor:pointer;
}

.pagination{
margin-top:20px;
display:flex;
gap:10px;
align-items:center;
font-size:14px;
}

.pagination button{
padding:6px 12px;
cursor:pointer;
border:1px solid #ccc;
background:white;
border-radius:4px;
}

#resultCount{
font-size:13px;
color:#666;
margin-bottom:10px;
}
</style>
</head>

<body>

<h1>Ultimate Etsy Keyword Database by Tia TX</h1>

<div class="info-box">
All this data was collected using Etsy's official Marketplace Insights tool, not external keyword tools.<br>
© Tia TX 2026
</div>

<div class="controls">

<label>
Database
<select id="databaseSelect"></select>
</label>

<label>
Date
<select id="dateSelect"></select>
</label>

<label>
Minimum Monthly Searches
<input type="number" id="minSearch">
</label>

<label>
Maximum Results
<input type="number" id="maxResults">
</label>

<label>
Minimum Monthly Search:Result Ratio
<input type="number" step="0.0001" id="minRatio">
</label>

<label>
Search Keywords
<input type="text" id="keywordFilter" placeholder="Filter keywords...">
</label>

</div>

<div class="table-hint">Click any column heading to sort ⇅</div>
<div id="resultCount"></div>

<table id="keywordTable">
<thead>
<tr>
<th onclick="sortTable(0,'text')">Keyword <span class="sort-icon">⇅</span></th>
<th onclick="sortTable(1,'num')">Searches <span class="sort-icon">⇅</span></th>
<th onclick="sortTable(2,'num')">Results <span class="sort-icon">⇅</span></th>
<th onclick="sortTable(3,'num')">Search:Result <span class="sort-icon">⇅</span></th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<div class="pagination">
<button onclick="prevPage()">Previous</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">Next</button>
</div>

<script>

/* TOKEN PROTECTION */
const token = new URLSearchParams(window.location.search).get("t");
if(token !== "members-7k39f4x2"){
document.body.innerHTML="Access restricted";
throw new Error("Unauthorized");
}

/* DISABLE RIGHT CLICK */
document.addEventListener("contextmenu", e => e.preventDefault());

/* DISABLE DEVTOOLS SHORTCUTS */
document.onkeydown=function(e){
if(
e.keyCode===123 || 
(e.ctrlKey && e.shiftKey && e.keyCode===73) ||
(e.ctrlKey && e.shiftKey && e.keyCode===74) ||
(e.ctrlKey && e.shiftKey && e.keyCode===67) ||
(e.ctrlKey && e.keyCode===85) ||
(e.ctrlKey && e.keyCode===83)
){
return false;
}
};

const DATABASES=[
{
name:"Top Etsy Search Terms",
dates:{
"Q4 2025":"Top-etsy-search-terms-q4-2025.csv"
}
},
{
name:"Hat Keywords",
dates:{
"Q1 2026":"Hat-terms-Q1-2026.csv"
}
}
];

let tableData=[]
let currentData=[]
let sortDir={}
let currentSortCol=null

let pageSize=2000
let currentPage=1

function init(){

const dbSelect=document.getElementById("databaseSelect")

DATABASES.forEach((db,i)=>{
const opt=document.createElement("option")
opt.value=i
opt.textContent=db.name
dbSelect.appendChild(opt)
})

updateDates()
}

function updateDates(){

const dbIndex=document.getElementById("databaseSelect").value
const db=DATABASES[dbIndex]

const dateSelect=document.getElementById("dateSelect")
dateSelect.innerHTML=""

Object.keys(db.dates).forEach(date=>{

const opt=document.createElement("option")
opt.value=db.dates[date]
opt.textContent=date

dateSelect.appendChild(opt)

})

loadCSV(dateSelect.value)
}

async function loadCSV(file){

const response=await fetch(file)
const text=await response.text()

const rows=text.trim().split("\n").map(r=>r.split(","))
rows.shift()

tableData=rows.map(r=>({
keyword:r[0],
searches:parseFloat(r[1]),
results:parseFloat(r[2]),
ratio:parseFloat(r[3])
}))

currentData=[...tableData]
currentPage=1

renderTable()
}

function renderTable(){

const body=document.getElementById("tableBody")
body.innerHTML=""

const fragment=document.createDocumentFragment()

const start=(currentPage-1)*pageSize
const pageData=currentData.slice(start,start+pageSize)

pageData.forEach(row=>{

const tr=document.createElement("tr")

tr.innerHTML=`
<td>
<button class="copyBtn" onclick="copyKeyword('${row.keyword}')">Copy</button>
${row.keyword}
</td>
<td>${row.searches}</td>
<td>${row.results}</td>
<td>${row.ratio}</td>
`

fragment.appendChild(tr)

})

body.appendChild(fragment)

updatePageInfo()
updateResultCount(pageData.length)
}

function updatePageInfo(){

const totalPages=Math.ceil(currentData.length/pageSize)

document.getElementById("pageInfo").textContent=
"Page "+currentPage+" of "+(totalPages||1)
}

function updateResultCount(visible){

const total=currentData.length

document.getElementById("resultCount").textContent=
"Showing "+visible+" of "+total.toLocaleString()+" keywords"
}

function nextPage(){

const totalPages=Math.ceil(currentData.length/pageSize)

if(currentPage<totalPages){
currentPage++
renderTable()
}
}

function prevPage(){

if(currentPage>1){
currentPage--
renderTable()
}
}

function copyKeyword(text){
navigator.clipboard.writeText(text)
}

function applyFilters(){

let filtered=[...tableData]

const minSearch=parseFloat(document.getElementById("minSearch").value)||0
const maxResults=parseFloat(document.getElementById("maxResults").value)||Infinity
const minRatio=parseFloat(document.getElementById("minRatio").value)||0
const keyword=document.getElementById("keywordFilter").value.toLowerCase()

filtered=filtered.filter(row=>{
return row.searches>=minSearch &&
row.results<=maxResults &&
row.ratio>=minRatio &&
row.keyword.toLowerCase().includes(keyword)
})

currentData=filtered
currentPage=1
renderTable()
}

function debounce(func,delay){
let timeout;
return function(){
clearTimeout(timeout)
timeout=setTimeout(func,delay)
}
}

const debouncedFilter=debounce(applyFilters,300)

function sortTable(col,type){

sortDir[col]=!sortDir[col]
currentSortCol=col

currentData.sort((a,b)=>{

let A=Object.values(a)[col]
let B=Object.values(b)[col]

if(type==="num"){
return sortDir[col]?A-B:B-A
}

return sortDir[col]?A.localeCompare(B):B.localeCompare(A)
})

updateSortUI()
renderTable()
}

function updateSortUI(){

document.querySelectorAll("#keywordTable th").forEach((th,i)=>{
th.classList.remove("sorted")
const icon=th.querySelector(".sort-icon")
icon.textContent="⇅"
})

if(currentSortCol!==null){

const th=document.querySelectorAll("#keywordTable th")[currentSortCol]
th.classList.add("sorted")

const icon=th.querySelector(".sort-icon")
icon.textContent=sortDir[currentSortCol]?"↑":"↓"
}
}

document.getElementById("databaseSelect").addEventListener("change",updateDates)

document.getElementById("dateSelect").addEventListener("change",function(){
loadCSV(this.value)
})

document.querySelectorAll("#minSearch,#maxResults,#minRatio,#keywordFilter")
.forEach(el=>el.addEventListener("input",debouncedFilter))

init()

</script>
</body>
</html>
